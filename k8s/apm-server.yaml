apiVersion: apm.k8s.elastic.co/v1
kind: ApmServer
metadata:
  name: apm-server
  namespace: default
spec:
  version: 8.15.0
  count: 1
  elasticsearchRef:
    name: elasticsearch
  kibanaRef:
    name: kibana
  config:
    output.elasticsearch:
      protocol: https
      ssl.verification_mode: none
      ssl.enabled: true
    podTemplate:
      spec:
        nodeSelector:
          kubernetes.io/hostname: ubuntu
