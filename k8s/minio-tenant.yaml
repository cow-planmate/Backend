apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: minio
  namespace: default
spec:
  image: minio/minio:RELEASE.2024-12-13T00-00-00Z
  imagePullPolicy: IfNotPresent
  
  configuration:
    name: minio-creds-secret

  # --- 추가된 환경 변수 설정 ---
  env:
    - name: MINIO_AUDIT_ELASTICSEARCH_ENABLE_minio-http-audit-elasticsearch
      value: "on"
    - name: MINIO_AUDIT_ELASTICSEARCH_ENDPOINT_minio-http-audit-elasticsearch
      value: "https://elasticsearch-es-http.default.svc:9200/minio-audit-log/_doc"
    - name: MINIO_AUDIT_ELASTICSEARCH_USERNAME_minio-http-audit-elasticsearch
      value: "elastic"
    # ECK Secret에서 비밀번호 자동 주입
    - name: MINIO_AUDIT_ELASTICSEARCH_PASSWORD_minio-http-audit-elasticsearch
      valueFrom:
        secretKeyRef:
          name: elasticsearch-es-elastic-user
          key: elastic
    # 인증서 검증 건너뛰기 (curl -k와 동일 효과)
    - name: MINIO_AUDIT_ELASTICSEARCH_SKIP_VERIFY_minio-http-audit-elasticsearch
      value: "on"
  # ---------------------------

  pools:
    - name: pool-0
      servers: 2
      volumesPerServer: 4
      resources:
        requests:
          cpu: "50m"
          memory: "256Mi"
        limits:
          cpu: "150m"
          memory: "512Mi"
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: local-path
          resources:
            requests:
              storage: 3000Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: v1.min.io/tenant
                  operator: In
                  values:
                  - minio
              topologyKey: "kubernetes.io/hostname"

  mountPath: /export
  requestAutoCert: false

  exposeServices:
    console: false
    minio: false