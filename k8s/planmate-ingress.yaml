apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: planmate-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "route"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
spec:
  tls:
  - hosts:
    - pmserver1.salmakis.cloud
    - minio.salmakis.cloud
    - redis.salmakis.cloud
    - db.salmakis.cloud
    - kibana.salmakis.cloud
    secretName: planmate-backend-tls
  rules:
  - host: kibana.salmakis.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kibana-kb-http
            port:
              number: 5601
  - host: redis.salmakis.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: redisinsight-service
            port:
              number: 80
  - host: db.salmakis.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pgadmin-service
            port:
              number: 80
  - host: pmserver1.salmakis.cloud
    http:
      paths:
      # 커뮤니티 마이크로서비스 — /api/community/* 는 community-service로 라우팅 (/ 룰보다 먼저)
      - path: /api/community
        pathType: Prefix
        backend:
          service:
            name: community-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: planmate-backend-service
            port:
              number: 80

  - host: minio.salmakis.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: myminio-console
            port:
              number: 9090