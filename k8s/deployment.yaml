apiVersion: apps/v1
kind: Deployment
metadata:
  name: planmate-backend
  namespace: default
  labels:
    app: planmate-backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: planmate-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: planmate-backend
    spec:
      # 노드당 1개씩 강제 분산(가용성). 후보 노드는 amd64인 control.k8s/ubuntu 2개뿐이고
      # 레플리카도 2개라, 둘이 같은 노드에 몰리면 그 노드 장애 시 전체가 내려간다.
      #
      # whenUnsatisfiable: DoNotSchedule 로 분산을 강제하되, matchLabelKeys: [pod-template-hash]
      # 로 skew 계산을 "같은 리비전(ReplicaSet) 파드끼리만" 한정한다.
      # → 이게 없으면 롤링 업데이트 때 maxSurge로 띄우는 신규 파드가 구버전 파드까지
      #   카운트해 2노드가 모두 점유된 것으로 보고 surge 파드가 Pending 데드락에 빠진다.
      #   (예전에 이 옵션 없이 고정했다가 "2개 이상 못 들어간다"는 오류로 롤백했던 원인)
      #   k8s 1.27+ 필요 (현재 클러스터 1.34).
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: planmate-backend
        matchLabelKeys:
        - pod-template-hash
      affinity:
        # 백엔드 이미지(cycle123/planmate)는 CI에서 amd64로만 빌드되므로
        # arm64 노드(oracle-arm)에 스케줄되면 exec format error로 크래시한다.
        # → amd64 노드(control.k8s, ubuntu)로 고정. 멀티아치 이미지로 전환하면 이 블록 제거.
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: planmate-backend
              topologyKey: "kubernetes.io/hostname"
      containers:
      - name: planmate-backend
        image: cycle123/planmate:d264cdb66bca1ecaebad8957698e3b122fd8f541
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: planmate-config
        env:
        - name: SPRING_CONFIG_IMPORT
          value: "optional:file:/app/config/application-secret.yml"
        - name: TZ
          value: "Asia/Seoul"
        - name: SPRING_DATASOURCE_MASTER_JDBC_URL # Spring의 datasource.master.jdbc-url에 주입
          value: "jdbc:p6spy:postgresql://planmate-db-rw:5432/planmate"
        - name: SPRING_DATASOURCE_MASTER_USERNAME
          valueFrom:
            secretKeyRef:
              name: planmate-db-user-password
              key: username
        - name: SPRING_DATASOURCE_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: planmate-db-user-password
              key: password
        - name: SPRING_DATASOURCE_REPLICA_JDBC_URL # Replica 설정 (필요시)
          value: "jdbc:p6spy:postgresql://planmate-db-rw:5432/planmate"
        - name: SPRING_DATASOURCE_REPLICA_USERNAME
          valueFrom:
            secretKeyRef:
              name: planmate-db-user-password
              key: username
        - name: SPRING_DATASOURCE_REPLICA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: planmate-db-user-password
              key: password
        - name: SPRING_MAIL_USERNAME
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: MAIL_USERNAME
        - name: SPRING_MAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: MAIL_PASSWORD
        - name: ELASTIC_APM_SERVER_URLS
          value: "https://apm-server-apm-http:8200"
        - name: ELASTIC_APM_VERIFY_SERVER_CERT
          value: "false"
        - name: ELASTIC_APM_SECRET_TOKEN
          valueFrom:
            secretKeyRef:
              name: apm-server-apm-token
              key: secret-token
        - name: ELASTIC_APM_SERVER_REQUEST_TIMEOUT
          value: "120s"
        - name: ELASTIC_APM_API_REQUEST_SIZE
          value: "2mb"
        - name: ELASTIC_APM_SERVICE_NAME
          value: "planmate-backend"
        - name: ELASTIC_APM_ENVIRONMENT
          value: "prod"
        - name: ELASTIC_APM_APPLICATION_PACKAGES
          value: "com.example.planmate"
        - name: ELASTIC_APM_LOG_SENDING
          value: "true"
        - name: ELASTIC_APM_LOG_LEVEL
          value: "INFO"
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms512m -Xmx1024m"
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: JWT_ACCESS_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: JWT_REFRESH_SECRET
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: REDIS_PASSWORD
        # Sentinel 인증용(= redis 비밀번호와 동일). configmap의 SENTINEL_NODES와 함께
        # 동작해 Lettuce가 sentinel을 통해 현재 master를 찾는다(노드 장애 시 자동 추종).
        - name: SPRING_DATA_REDIS_SENTINEL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: REDIS_PASSWORD
        - name: API_GOOGLE_KEY
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: API_GOOGLE_KEY
        - name: GOOGLE_GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: GOOGLE_GEMINI_API_KEY
        - name: GOOGLE_GEMINI_API_URL
          valueFrom:
            configMapKeyRef:
              name: planmate-config
              key: GOOGLE_GEMINI_API_URL
        - name: STORAGE_TYPE
          valueFrom:
            configMapKeyRef:
              name: planmate-config
              key: STORAGE_TYPE
        - name: MINIO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: planmate-config
              key: MINIO_ENDPOINT
        - name: MINIO_BUCKET
          valueFrom:
            configMapKeyRef:
              name: planmate-config
              key: MINIO_BUCKET
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: planmate-secret
              key: MINIO_SECRET_KEY
        - name: FIREBASE_SERVICE_ACCOUNT_PATH
          value: "classpath:planmate-9fbb4-firebase-adminsdk-fbsvc-d4a32e483c.json"
        - name: FIREBASE_SERVICE_ACCOUNT_JSON
          valueFrom:
            secretKeyRef:
              name: planmate-firebase-secret
              key: FIREBASE_SERVICE_ACCOUNT_JSON
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: secret-volume
          mountPath: "/app/config"
          readOnly: true
      volumes:
      - name: secret-volume
        secret:
          secretName: planmate-application-secret
