apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: kibana
  namespace: default
spec:
  version: 8.15.0
  count: 1
  elasticsearchRef:
    name: elasticsearch
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  # ES/APM과 동일하게 oracle-arm 노드에 배치 (모니터링 스택 co-location)
  podTemplate:
    spec:
      nodeSelector:
        kubernetes.io/hostname: oracle-arm
