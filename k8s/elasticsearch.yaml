apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
  namespace: default
spec:
  version: 8.15.0
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  nodeSets:
  - name: default
    count: 1
    config:
      node.store.allow_mmap: false
    podTemplate:
      spec:
        # 모니터링 스택은 신규 oracle-arm(arm64) 노드에 모아서 배치.
        # ES 8.15는 arm64 멀티아치 이미지 제공 → arm 노드에서 정상 동작.
        nodeSelector:
          kubernetes.io/hostname: oracle-arm

        containers:
        - name: elasticsearch
          resources:
            requests:
              memory: 4Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: 1
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: local-path