apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: planmate-redis
  namespace: default
spec:
  # 인스턴스 개수 (Master 1 + Replica 1)
  clusterSize: 2
  
  kubernetesConfig:
    image: redis:7.2.4
    imagePullPolicy: IfNotPresent
    # 비밀번호를 전용 Secret에서 가져옵니다.
    redisSecret:
      name: planmate-redis-password
      key: password
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # 노드 분산 설정 (Anti-Affinity)
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - planmate-redis
          topologyKey: "kubernetes.io/hostname"

  # Live 상태와 맞추기 위해 redisConfig는 비워둡니다.
  redisConfig: {}

  # 저장소 설정 (500Mi)
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 300Mi
---
# 자동 failover: RedisReplication 단독은 master가 죽어도 replica를 승격하지 않는다.
# (실제로 control.k8s 노드 장애 시 master가 죽은 노드에 묶인 채 멈춰 백엔드 WebSocket/STOMP가
#  깨졌다.) RedisSentinel이 master를 직접 핑해 down 감지 → quorum 합의 → replica 자동 승격.
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: planmate-redis-sentinel
  namespace: default
spec:
  clusterSize: 3            # sentinel 3개(quorum 2). 노드 적으면 일부는 co-locate 가능.
  kubernetesConfig:
    image: quay.io/opstree/redis-sentinel:v7.2.3   # v7.2.4 태그는 OT 레지스트리에 없음(7.2 라인 최신 패치)
    imagePullPolicy: IfNotPresent
    redisSecret:
      name: planmate-redis-password
      key: password
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  redisSentinelConfig:
    redisReplicationName: planmate-redis   # 감시 대상 RedisReplication
    masterGroupName: myMaster
    quorum: "2"
    downAfterMilliseconds: "5000"
    failoverTimeout: "30000"
    parallelSyncs: "1"
    redisReplicationPassword:
      secretKeyRef:
        name: planmate-redis-password
        key: password
