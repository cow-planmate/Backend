apiVersion: batch/v1
kind: CronJob
metadata:
  name: planmate-gdrive-backup
  namespace: default
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - args:
            - |
              apk add --no-cache postgresql-client

              # 1. PostgreSQL 변경 체크 및 백업
              echo "Checking PostgreSQL changes..."
              STATE_FILE="/state/last_xact"
              LAST_XACT=$(cat $STATE_FILE 2>/dev/null || echo 0)

              CURR_XACT=$(PGPASSWORD=$DB_PASSWORD psql -h planmate-db-ro -U $DB_USER -d planmate -t -A -c "SELECT xact_commit + xact_rollback FROM pg_stat_database WHERE datname='planmate'")

              if [ -n "$CURR_XACT" ] && [ "$CURR_XACT" != "$LAST_XACT" ]; then
                echo "Postgres changed ($LAST_XACT -> $CURR_XACT). Backing up..."
                PGPASSWORD=$DB_PASSWORD pg_dump -h planmate-db-ro -U $DB_USER planmate | \
                rclone --config /config/rclone.conf rcat gdrive:planmatebackup/postgres/planmate_$(date +%Y%m%d_%H%M%S).sql
                
                if [ $? -eq 0 ]; then
                  echo $CURR_XACT > $STATE_FILE
                  echo "Postgres backup complete."
                fi
              else
                echo "No changes in Postgres or could not connect. Skipping backup."
              fi

              # 2. MinIO 동기화
              echo "Syncing MinIO to Google Drive..."
              rclone --config /config/rclone.conf sync minio:planmate gdrive:planmatebackup/minio --progress
            command:
            - /bin/sh
            - -c
            env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: planmate-db-user-password
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: planmate-db-user-password
            - name: RCLONE_CONFIG_MINIO_TYPE
              value: "s3"
            - name: RCLONE_CONFIG_MINIO_PROVIDER
              value: "Minio"
            - name: RCLONE_CONFIG_MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  key: MINIO_ACCESS_KEY
                  name: planmate-secret
            - name: RCLONE_CONFIG_MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: MINIO_SECRET_KEY
                  name: planmate-secret
            - name: RCLONE_CONFIG_MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  key: MINIO_ENDPOINT
                  name: planmate-config
            image: rclone/rclone:latest
            name: backup
            volumeMounts:
            - mountPath: /config
              name: rclone-config
              readOnly: true
            - mountPath: /state
              name: state-storage
          restartPolicy: OnFailure
          volumes:
          - name: rclone-config
            secret:
              secretName: rclone-config
          - name: state-storage
            persistentVolumeClaim:
              claimName: backup-state-pvc
  schedule: '*/5 * * * *'
